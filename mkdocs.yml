site_name: Family mruby project
site_description: Family mruby project documentation
site_author: kishima
site_url: https://family-mruby.github.io/

theme:
  favicon: assets/favicon.ico
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ja
          name: 日本語
          build: true
          nav_translations:
            Home: ホーム
            Architecture: アーキテクチャ
            Getting Started: はじめに
            Power & Connection: 起動と接続
            Hello World: Hello World
            BLE File Manager: BLE ファイルマネージャ
            Default Apps: 標準アプリ
            API Reference: API リファレンス
            Overview: 一覧
            FmrbApp: FmrbApp
            FmrbGfx: FmrbGfx
            Sprite: Sprite
            FmrbAudio: FmrbAudio
            Pub/Sub: Pub/Sub
            File & I/O: ファイル・I/O
            Log: ログ
            Peripherals: 周辺機器
            Utilities: ユーティリティ
            Constants & System Info: 定数・システム情報
            Task & Machine: Task / Machine
            File Formats: ファイル形式
            App Config (.toml): アプリ設定ファイル (.toml)
            Audio File Formats: 音声ファイルフォーマット
            Image & Icon Files: 画像・アイコンファイル
            Limitations: 制約事項
            Examples: サンプル集
            Hardware: ハードウェア
            Verified Peripherals: 動作確認済み機器

nav:
  - Home: index.md
  - Getting Started:
      - Power & Connection: getting_started/setup.md
      - Hello World: getting_started/hello_world.md
      - BLE File Manager: getting_started/ble_file_manager.md
      - Default Apps: getting_started/default_apps.md
  - API Reference:
      - Overview: api/index.md
      - FmrbApp: api/fmrb_app.md
      - FmrbGfx: api/fmrb_gfx.md
      - Sprite: api/sprite.md
      - FmrbAudio: api/audio.md
      - Pub/Sub: api/pubsub.md
      - File & I/O: api/filesystem.md
      - Log: api/log.md
      - Peripherals: api/peripherals.md
      - Utilities: api/utilities.md
      - Constants & System Info: api/const.md
      - Task & Machine: api/system.md
  - File Formats:
      - App Config (.toml): file_formats/app_toml.md
      - Audio File Formats: file_formats/audio_formats.md
      - Image & Icon Files: file_formats/image_formats.md
  - Limitations: limitations.md
  - Examples: examples.md
  - Architecture: architecture.md
  - Hardware: hardware.md
  - Verified Peripherals: compatibility.md

markdown_extensions:
  - admonition
  - codehilite
  - meta
  - toc:
      permalink: true
