<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family mruby File Manager</title>
<style>
/* ----------------------------------------------------------------------
 * Color palette: matches the Family mruby on-device system theme
 * (RGB332 menu_bg=0xC5 → #D82455 ruby red; border/button=0x60 → #6C0000;
 * desktop_bg=0xF6 → #FCB4AA salmon; text=#FFFFFF/#000000).
 * The web client uses a darker, web-friendly variation that keeps the
 * ruby red as the primary accent.
 * ---------------------------------------------------------------------- */
:root {
  --ruby:        #d82455;  /* primary accent (= menu_bg) */
  --ruby-dark:   #6c0000;  /* button / border (= border/button) */
  --ruby-deeper: #4a0014;  /* surface tint */
  --ruby-pale:   #fcb4aa;  /* desktop_bg, used for highlights */
  --bg-base:     #1a0a10;  /* main window background */
  --bg-surface:  #2a0e18;  /* panels / breadcrumb / toolbar buttons */
  --bg-surface2: #3a0e1a;  /* hover surfaces */
  --bg-deep:     #0d0508;  /* deep background (logs, editor) */
  --border:      #4a1c28;
  --text:        #f0e0e0;
  --text-mute:   #b08890;
  --ok:          #66bb6a;
  --err:         #ef5350;
  --warn:        #ffb74d;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-base); color: var(--text); }
.container { max-width: 800px; margin: 0 auto; padding: 16px; }

header { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
header h1 { font-size: 1.2em; flex: 1; color: var(--ruby-pale); }
.status { font-size: 0.85em; padding: 4px 10px; border-radius: 12px; background: var(--bg-surface); }
.status.connected { background: var(--ruby); color: #fff; }

.toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9em;
         background: var(--bg-surface); color: var(--text); transition: background 0.2s; }
button:hover { background: var(--bg-surface2); }
button:disabled { opacity: 0.4; cursor: default; }
button.primary { background: var(--ruby); color: #fff; }
button.primary:hover { background: #b81e47; }
button.danger { background: var(--ruby-dark); color: #fff; }
button.danger:hover { background: #8c0000; }

.breadcrumb { display: flex; gap: 4px; align-items: center; padding: 8px 12px; background: var(--bg-surface);
              border-radius: 6px; margin-bottom: 12px; font-size: 0.9em; min-height: 36px; flex-wrap: wrap; }
.breadcrumb span { cursor: pointer; color: var(--ruby-pale); }
.breadcrumb span:hover { text-decoration: underline; }
.breadcrumb .sep { color: var(--text-mute); cursor: default; }

.file-list { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.file-row { display: flex; align-items: center; padding: 10px 12px; border-bottom: 1px solid var(--border);
            cursor: pointer; transition: background 0.15s; }
.file-row:last-child { border-bottom: none; }
.file-row:hover { background: var(--bg-surface); }
.file-row .icon { width: 24px; margin-right: 10px; text-align: center; font-size: 1.1em; }
.file-row .name { flex: 1; }
.file-row .size { color: var(--text-mute); font-size: 0.85em; min-width: 80px; text-align: right; }
.file-row .actions { display: flex; gap: 4px; }
.file-row .actions button { padding: 4px 8px; font-size: 0.8em; }

.empty-msg { padding: 24px; text-align: center; color: var(--text-mute); }

.upload-area { border: 2px dashed var(--border); border-radius: 6px; padding: 24px; text-align: center;
               margin-top: 12px; cursor: pointer; transition: border-color 0.2s; }
.upload-area:hover, .upload-area.drag { border-color: var(--ruby); }
.upload-area input { display: none; }

.log-area { margin-top: 16px; }
.log-area summary { cursor: pointer; color: var(--text-mute); font-size: 0.85em; }
.log-box { max-height: 200px; overflow-y: auto; background: var(--bg-deep); border-radius: 6px;
           padding: 8px; font-family: monospace; font-size: 0.8em; margin-top: 8px; }
.log-box .log-line { padding: 2px 0; word-break: break-all; }
.log-box .err { color: var(--err); }
.log-box .ok { color: var(--ok); }

.progress { margin-top: 8px; display: none; }
.progress-bar { height: 4px; background: var(--bg-surface); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--ruby); transition: width 0.2s; width: 0%; }
.progress-text { font-size: 0.8em; color: var(--text-mute); margin-top: 4px; }

.editor-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none;
                align-items: center; justify-content: center; z-index: 100; }
.editor-modal.open { display: flex; }
.editor-card { background: var(--bg-base); border: 1px solid var(--border); border-radius: 8px;
               width: 92%; max-width: 900px; height: 86%; display: flex; flex-direction: column; }
.editor-header { display: flex; align-items: center; gap: 8px; padding: 10px 14px;
                 border-bottom: 1px solid var(--border); }
.editor-header .path { flex: 1; font-family: monospace; font-size: 0.9em; word-break: break-all; }
.editor-header .dirty { color: var(--warn); font-size: 0.85em; }
.editor-area { flex: 1; padding: 0; }
.editor-area textarea { width: 100%; height: 100%; background: var(--bg-deep); color: var(--text);
                        border: none; outline: none; padding: 12px; font-family: monospace;
                        font-size: 1.1em; resize: none; line-height: 1.5; }
.editor-footer { display: flex; gap: 8px; padding: 8px 14px; border-top: 1px solid var(--border);
                 font-size: 0.8em; color: var(--text-mute); }
.editor-footer .stats { flex: 1; }
.editor-footer .err { color: var(--err); }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Family mruby File Manager</h1>
    <span class="status" id="storageInfo"></span>
    <span class="status" id="statusBadge">Disconnected</span>
  </header>

  <div class="toolbar">
    <button id="btnConnect" class="primary" onclick="toggleConnection()">Connect</button>
    <button id="btnRefresh" disabled onclick="refreshDir()">Refresh</button>
    <button id="btnMkdir" disabled onclick="createDir()">New Folder</button>
    <button id="btnNewFile" disabled onclick="createFile()">New File</button>
  </div>

  <div class="breadcrumb" id="breadcrumb"></div>

  <div class="file-list" id="fileList">
    <div class="empty-msg">Connect to a Family-mruby device to browse files.</div>
  </div>

  <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
    <input type="file" id="fileInput" multiple onchange="uploadFiles(this.files)">
    Drop files here or click to upload
  </div>

  <div class="progress" id="progress">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text" id="progressText"></div>
  </div>

  <div class="log-area">
    <details>
      <summary>Log</summary>
      <div class="log-box" id="logBox"></div>
    </details>
  </div>
</div>

<div class="editor-modal" id="editorModal">
  <div class="editor-card">
    <div class="editor-header">
      <span class="path" id="editorPath"></span>
      <span class="dirty" id="editorDirty"></span>
      <button class="primary" onclick="saveEditor()">Save</button>
      <button onclick="closeEditor()">Close</button>
    </div>
    <div class="editor-area">
      <textarea id="editorTextarea" spellcheck="false"></textarea>
    </div>
    <div class="editor-footer">
      <span class="stats" id="editorStats"></span>
      <span id="editorMessage"></span>
    </div>
  </div>
</div>

<script>
// ============================================================
// BLE UUIDs (must match ble_task.c)
// ============================================================
// UUID string is big-endian representation of BLE_UUID128_INIT (little-endian).
// BLE_UUID128_INIT(0x0Y, 0x00,..., 0x45, 0x4c, 0x42, 0x59, 0x52, 0x42, 0x4d, 0x41, 0x52, 0x46)
//   byte[15..12]=46,52,41,4d  byte[11..10]=42,52  byte[9..8]=59,42
//   byte[7..6]=4c,45  byte[5..0]=00,00,00,00,00,0Y
const SERVICE_UUID      = '4652414d-4252-5942-4c45-000000000001';
const DEVICE_INFO_UUID  = '4652414d-4252-5942-4c45-000000000002';
const FS_RX_UUID        = '4652414d-4252-5942-4c45-000000000003';
const FS_TX_UUID        = '4652414d-4252-5942-4c45-000000000004';

// Protocol constants
const CMD_CD     = 0x11;
const CMD_LS     = 0x12;
const CMD_RM     = 0x13;
const CMD_MKDIR  = 0x14;
const CMD_STATFS = 0x15;
const CMD_RENAME = 0x16;
const CMD_GET    = 0x21;
const CMD_PUT    = 0x22;

const WRITE_CHUNK_SIZE = 200; // Conservative BLE write chunk size
const FILE_CHUNK_SIZE  = 2048;
const EDITOR_MAX_SIZE  = 256 * 1024;
const TEXT_EXTENSIONS = new Set([
  'rb', 'txt', 'md', 'toml', 'json', 'yml', 'yaml',
  'csv', 'ini', 'conf', 'log', 'cfg', 'xml', 'html',
  'css', 'js', 'c', 'h', 'cpp', 'hpp', 'py', 'sh'
]);

// ============================================================
// State
// ============================================================
let bleDevice = null;
let rxChar = null;
let txChar = null;
let currentPath = '/';
let rxBuffer = new Uint8Array(0);
let pendingResolve = null;
let pendingReject = null;

// ============================================================
// CRC32
// ============================================================
const crc32Table = new Uint32Array(256);
(function() {
  for (let i = 0; i < 256; i++) {
    let c = i;
    for (let j = 0; j < 8; j++) {
      c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
    }
    crc32Table[i] = c >>> 0;
  }
})();

function crc32(data) {
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < data.length; i++) {
    crc = (crc >>> 8) ^ crc32Table[(crc ^ data[i]) & 0xFF];
  }
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

// ============================================================
// COBS encode/decode
// ============================================================
function cobsEncode(input) {
  const output = [];
  let codeIdx = 0;
  output.push(0); // placeholder
  let code = 1;

  for (let i = 0; i < input.length; i++) {
    if (input[i] === 0) {
      output[codeIdx] = code;
      code = 1;
      codeIdx = output.length;
      output.push(0);
    } else {
      output.push(input[i]);
      code++;
      if (code === 0xFF) {
        output[codeIdx] = code;
        code = 1;
        codeIdx = output.length;
        output.push(0);
      }
    }
  }
  output[codeIdx] = code;
  return new Uint8Array(output);
}

function cobsDecode(input) {
  const output = [];
  let i = 0;
  while (i < input.length) {
    const code = input[i++];
    if (code === 0) break;
    for (let j = 1; j < code && i < input.length; j++) {
      output.push(input[i++]);
    }
    if (code < 0xFF && i < input.length) {
      output.push(0);
    }
  }
  return new Uint8Array(output);
}

// ============================================================
// Protocol: build packet and parse response
// ============================================================
function buildPacket(cmd, jsonStr, binaryData) {
  const jsonBytes = new TextEncoder().encode(jsonStr);
  const jsonLen = jsonBytes.length;
  const binLen = binaryData ? binaryData.length : 0;

  // [cmd(1)][json_len(2 BE)][json][binary]
  const body = new Uint8Array(1 + 2 + jsonLen + binLen);
  body[0] = cmd;
  body[1] = (jsonLen >> 8) & 0xFF;
  body[2] = jsonLen & 0xFF;
  body.set(jsonBytes, 3);
  if (binaryData) {
    body.set(binaryData, 3 + jsonLen);
  }

  // Append CRC32 (big-endian)
  const crcVal = crc32(body);
  const packet = new Uint8Array(body.length + 4);
  packet.set(body);
  packet[body.length]     = (crcVal >> 24) & 0xFF;
  packet[body.length + 1] = (crcVal >> 16) & 0xFF;
  packet[body.length + 2] = (crcVal >> 8)  & 0xFF;
  packet[body.length + 3] = crcVal & 0xFF;

  // COBS encode + delimiter
  const encoded = cobsEncode(packet);
  const frame = new Uint8Array(encoded.length + 1);
  frame.set(encoded);
  frame[encoded.length] = 0x00; // delimiter
  return frame;
}

function parseResponse(data) {
  // data is COBS-encoded (without delimiter)
  const raw = cobsDecode(data);
  if (raw.length < 7) throw new Error('Response too short');

  // Verify CRC32
  const body = raw.slice(0, raw.length - 4);
  const rcvCrc = ((raw[raw.length-4] << 24) | (raw[raw.length-3] << 16) |
                  (raw[raw.length-2] << 8) | raw[raw.length-1]) >>> 0;
  const calcCrc = crc32(body);
  if (rcvCrc !== calcCrc) throw new Error('CRC mismatch');

  const jsonLen = (body[1] << 8) | body[2];
  const jsonStr = new TextDecoder().decode(body.slice(3, 3 + jsonLen));
  const meta = JSON.parse(jsonStr);

  let binData = null;
  if (meta.bin && meta.bin > 0) {
    binData = body.slice(3 + jsonLen, 3 + jsonLen + meta.bin);
  }

  return { meta, binData };
}

// ============================================================
// BLE communication
// ============================================================
function onTxNotification(event) {
  const value = new Uint8Array(event.target.value.buffer);

  // Append to rxBuffer
  const combined = new Uint8Array(rxBuffer.length + value.length);
  combined.set(rxBuffer);
  combined.set(value, rxBuffer.length);
  rxBuffer = combined;

  // Check for delimiter (0x00)
  const delimIdx = rxBuffer.indexOf(0x00);
  if (delimIdx >= 0) {
    const frameData = rxBuffer.slice(0, delimIdx);
    rxBuffer = rxBuffer.slice(delimIdx + 1);

    if (pendingResolve) {
      try {
        const result = parseResponse(frameData);
        pendingResolve(result);
      } catch (e) {
        pendingReject(e);
      }
      pendingResolve = null;
      pendingReject = null;
    }
  }
}

async function sendCommand(cmd, params, binaryData) {
  if (!rxChar || !txChar) throw new Error('Not connected');

  const frame = buildPacket(cmd, JSON.stringify(params), binaryData);

  // Fragment write into BLE-safe chunks
  for (let off = 0; off < frame.length; off += WRITE_CHUNK_SIZE) {
    const chunk = frame.slice(off, Math.min(off + WRITE_CHUNK_SIZE, frame.length));
    await rxChar.writeValueWithoutResponse(chunk);
  }

  // Wait for response
  return new Promise((resolve, reject) => {
    pendingResolve = resolve;
    pendingReject = reject;
    setTimeout(() => {
      if (pendingReject) {
        pendingReject(new Error('Response timeout'));
        pendingResolve = null;
        pendingReject = null;
      }
    }, 10000);
  });
}

// ============================================================
// Connection management
// ============================================================
async function toggleConnection() {
  if (bleDevice && bleDevice.gatt.connected) {
    bleDevice.gatt.disconnect();
    return;
  }
  await connect();
}

async function connect() {
  try {
    log('Requesting BLE device...');
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: 'Family-mruby-' }],
      optionalServices: [SERVICE_UUID]
    });

    bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

    log('Connecting to GATT server...');
    const server = await bleDevice.gatt.connect();

    log('Getting service...');
    const service = await server.getPrimaryService(SERVICE_UUID);

    rxChar = await service.getCharacteristic(FS_RX_UUID);
    txChar = await service.getCharacteristic(FS_TX_UUID);

    await txChar.startNotifications();
    txChar.addEventListener('characteristicvaluechanged', onTxNotification);
    log('Notifications enabled', 'ok');

    setConnected(true);
    log('Connected', 'ok');

    await refreshDir();
    await refreshStatfs();
  } catch (e) {
    log('Connection failed: ' + e.message, 'err');
    setConnected(false);
  }
}

function onDisconnected() {
  log('Disconnected', 'err');
  setConnected(false);
  rxChar = null;
  txChar = null;
  rxBuffer = new Uint8Array(0);
  pendingResolve = null;
  pendingReject = null;
  document.getElementById('storageInfo').textContent = '';
}

function setConnected(connected) {
  const badge = document.getElementById('statusBadge');
  const btn = document.getElementById('btnConnect');
  badge.textContent = connected ? 'Connected' : 'Disconnected';
  badge.className = 'status' + (connected ? ' connected' : '');
  btn.textContent = connected ? 'Disconnect' : 'Connect';
  document.getElementById('btnRefresh').disabled = !connected;
  document.getElementById('btnMkdir').disabled = !connected;
  document.getElementById('btnNewFile').disabled = !connected;
}

// ============================================================
// File operations
// ============================================================
async function refreshDir() {
  try {
    const { meta } = await sendCommand(CMD_LS, { path: currentPath });
    if (!meta.ok) {
      log('ls failed: ' + (meta.err || 'unknown'), 'err');
      return;
    }
    renderBreadcrumb();
    renderFileList(meta.entries || []);
  } catch (e) {
    log('ls error: ' + e.message, 'err');
  }
}

async function navigateTo(path) {
  currentPath = path;
  await refreshDir();
}

async function downloadFile(name) {
  const filePath = currentPath === '/' ? '/' + name : currentPath + '/' + name;
  log('Downloading: ' + filePath);
  showProgress(0, 'Downloading...');

  try {
    const chunks = [];
    let offset = 0;
    let totalRead = 0;

    while (true) {
      const { meta, binData } = await sendCommand(CMD_GET, { path: filePath, off: offset });
      if (!meta.ok) {
        log('Download failed: ' + (meta.err || 'unknown'), 'err');
        hideProgress();
        return;
      }

      if (binData && binData.length > 0) {
        chunks.push(binData);
        totalRead += binData.length;
        offset += binData.length;
        showProgress(-1, 'Downloaded ' + formatSize(totalRead));
      }

      if (meta.eof) break;
    }

    // Combine chunks and trigger browser download
    const totalSize = chunks.reduce((s, c) => s + c.length, 0);
    const combined = new Uint8Array(totalSize);
    let pos = 0;
    for (const chunk of chunks) {
      combined.set(chunk, pos);
      pos += chunk.length;
    }

    const blob = new Blob([combined]);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    a.click();
    URL.revokeObjectURL(url);

    log('Downloaded: ' + name + ' (' + formatSize(totalSize) + ')', 'ok');
  } catch (e) {
    log('Download error: ' + e.message, 'err');
  }
  hideProgress();
}

async function uploadFiles(fileList) {
  if (!rxChar) return;

  for (const file of fileList) {
    const remotePath = currentPath === '/' ? '/' + file.name : currentPath + '/' + file.name;
    log('Uploading: ' + file.name + ' (' + formatSize(file.size) + ')');
    showProgress(0, 'Uploading ' + file.name + '...');

    try {
      const data = new Uint8Array(await file.arrayBuffer());
      let offset = 0;

      while (offset <= data.length) {
        const chunk = data.slice(offset, offset + FILE_CHUNK_SIZE);
        const { meta } = await sendCommand(CMD_PUT, { path: remotePath, off: offset }, chunk);
        if (!meta.ok) {
          log('Upload failed: ' + (meta.err || 'unknown'), 'err');
          break;
        }
        offset += chunk.length;
        if (file.size > 0) {
          showProgress(Math.min(100, Math.round(offset / file.size * 100)),
                       'Uploading ' + file.name + '... ' + formatSize(offset) + ' / ' + formatSize(file.size));
        }
        if (chunk.length === 0) break;
      }

      log('Uploaded: ' + file.name, 'ok');
    } catch (e) {
      log('Upload error: ' + e.message, 'err');
    }
  }

  hideProgress();
  document.getElementById('fileInput').value = '';
  await refreshDir();
  await refreshStatfs();
}

// ============================================================
// Text editor
// ============================================================
let editorState = { name: null, original: '', dirty: false };

async function openEditor(name) {
  const filePath = currentPath === '/' ? '/' + name : currentPath + '/' + name;
  log('Opening: ' + filePath);
  showProgress(0, 'Loading...');

  try {
    const chunks = [];
    let offset = 0;
    while (true) {
      const { meta, binData } = await sendCommand(CMD_GET, { path: filePath, off: offset });
      if (!meta.ok) {
        log('Open failed: ' + (meta.err || 'unknown'), 'err');
        hideProgress();
        return;
      }
      if (binData && binData.length > 0) {
        chunks.push(binData);
        offset += binData.length;
      }
      if (meta.eof) break;
    }

    const totalSize = chunks.reduce((s, c) => s + c.length, 0);
    const combined = new Uint8Array(totalSize);
    let pos = 0;
    for (const chunk of chunks) {
      combined.set(chunk, pos);
      pos += chunk.length;
    }

    let text;
    try {
      text = new TextDecoder('utf-8', { fatal: true }).decode(combined);
    } catch (e) {
      hideProgress();
      if (confirm(name + ' may be a binary file (not valid UTF-8). Download instead?')) {
        return downloadFile(name);
      }
      return;
    }

    editorState = { name, original: text, dirty: false };
    document.getElementById('editorPath').textContent = filePath;
    document.getElementById('editorDirty').textContent = '';
    document.getElementById('editorMessage').textContent = '';
    const ta = document.getElementById('editorTextarea');
    ta.value = text;
    updateEditorStats();
    document.getElementById('editorModal').classList.add('open');
    setTimeout(() => ta.focus(), 0);
    log('Loaded: ' + name + ' (' + formatSize(totalSize) + ')', 'ok');
  } catch (e) {
    log('Open error: ' + e.message, 'err');
  }
  hideProgress();
}

async function saveEditor() {
  if (!editorState.name) return;
  const ta = document.getElementById('editorTextarea');
  const text = ta.value;
  const filePath = currentPath === '/' ? '/' + editorState.name : currentPath + '/' + editorState.name;

  const msgEl = document.getElementById('editorMessage');
  msgEl.textContent = 'Saving...';
  msgEl.className = '';

  try {
    const data = new TextEncoder().encode(text);
    await putFile(filePath, data);
    editorState.original = text;
    editorState.dirty = false;
    document.getElementById('editorDirty').textContent = '';
    msgEl.textContent = 'Saved (' + formatSize(data.length) + ')';
    log('Saved: ' + editorState.name, 'ok');
    await refreshDir();
    await refreshStatfs();
  } catch (e) {
    msgEl.textContent = 'Save failed: ' + e.message;
    msgEl.className = 'err';
    log('Save error: ' + e.message, 'err');
  }
}

function closeEditor() {
  if (editorState.dirty) {
    if (!confirm('Discard unsaved changes?')) return;
  }
  document.getElementById('editorModal').classList.remove('open');
  document.getElementById('editorTextarea').value = '';
  editorState = { name: null, original: '', dirty: false };
}

function updateEditorStats() {
  const ta = document.getElementById('editorTextarea');
  const text = ta.value;
  const lines = text.split('\n').length;
  const bytes = new TextEncoder().encode(text).length;
  document.getElementById('editorStats').textContent =
    lines + ' lines, ' + text.length + ' chars, ' + formatSize(bytes);
}

document.addEventListener('DOMContentLoaded', () => {
  const ta = document.getElementById('editorTextarea');
  ta.addEventListener('input', () => {
    const dirty = ta.value !== editorState.original;
    if (dirty !== editorState.dirty) {
      editorState.dirty = dirty;
      document.getElementById('editorDirty').textContent = dirty ? 'modified' : '';
    }
    updateEditorStats();
  });

  document.addEventListener('keydown', (e) => {
    const modalOpen = document.getElementById('editorModal').classList.contains('open');
    if (!modalOpen) return;
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      saveEditor();
    } else if (e.key === 'Escape') {
      e.preventDefault();
      closeEditor();
    }
  });
});

async function deleteFile(name, isDir) {
  const filePath = currentPath === '/' ? '/' + name : currentPath + '/' + name;
  if (!confirm('Delete ' + (isDir ? 'directory' : 'file') + ': ' + name + '?')) return;

  try {
    const { meta } = await sendCommand(CMD_RM, { path: filePath });
    if (!meta.ok) {
      log('Delete failed: ' + (meta.err || 'unknown'), 'err');
      return;
    }
    log('Deleted: ' + name, 'ok');
    await refreshDir();
    await refreshStatfs();
  } catch (e) {
    log('Delete error: ' + e.message, 'err');
  }
}

async function createDir() {
  const name = prompt('New folder name:');
  if (!name) return;

  const dirPath = currentPath === '/' ? '/' + name : currentPath + '/' + name;

  try {
    const { meta } = await sendCommand(CMD_MKDIR, { path: dirPath });
    if (!meta.ok) {
      log('mkdir failed: ' + (meta.err || 'unknown'), 'err');
      return;
    }
    log('Created folder: ' + name, 'ok');
    await refreshDir();
  } catch (e) {
    log('mkdir error: ' + e.message, 'err');
  }
}

async function createFile() {
  const name = prompt('New file name:');
  if (!name) return;

  const filePath = currentPath === '/' ? '/' + name : currentPath + '/' + name;

  try {
    await putFile(filePath, new Uint8Array(0));
    log('Created file: ' + name, 'ok');
    await refreshDir();
    await refreshStatfs();
  } catch (e) {
    log('create file error: ' + e.message, 'err');
  }
}

async function renameEntry(name, isDir) {
  const newName = prompt('New name:', name);
  if (newName === null) return;
  const trimmed = newName.trim();
  if (trimmed === '' || trimmed === name) return;
  if (trimmed.indexOf('/') !== -1) {
    log('Rename: name must not contain "/"', 'err');
    return;
  }

  const from = currentPath === '/' ? '/' + name : currentPath + '/' + name;
  const to = currentPath === '/' ? '/' + trimmed : currentPath + '/' + trimmed;

  try {
    const { meta } = await sendCommand(CMD_RENAME, { from: from, to: to });
    if (!meta.ok) {
      log('Rename failed: ' + (meta.err || 'unknown'), 'err');
      return;
    }
    log('Renamed: ' + name + ' -> ' + trimmed, 'ok');
    await refreshDir();
  } catch (e) {
    log('Rename error: ' + e.message, 'err');
  }
}

async function refreshStatfs() {
  try {
    const { meta } = await sendCommand(CMD_STATFS, { path: '/' });
    if (!meta.ok) return;
    const free = formatSize(meta.free);
    const total = formatSize(meta.total);
    document.getElementById('storageInfo').textContent = 'Free: ' + free + ' / ' + total;
  } catch (e) {
    // STATFS is informational; never break the UI on failure
    log('statfs error: ' + e.message, 'err');
  }
}

async function putFile(remotePath, data) {
  let offset = 0;
  while (offset <= data.length) {
    const chunk = data.slice(offset, offset + FILE_CHUNK_SIZE);
    const { meta } = await sendCommand(CMD_PUT, { path: remotePath, off: offset }, chunk);
    if (!meta.ok) {
      throw new Error(meta.err || 'put failed');
    }
    offset += chunk.length;
    if (chunk.length === 0) break;
  }
}

// ============================================================
// UI rendering
// ============================================================
function renderBreadcrumb() {
  const el = document.getElementById('breadcrumb');
  const parts = currentPath.split('/').filter(p => p);

  let html = '<span onclick="navigateTo(\'/\')">/</span>';
  let path = '';
  for (let i = 0; i < parts.length; i++) {
    const part = parts[i];
    path += '/' + part;
    const p = path; // closure capture
    // Skip separator between root '/' and first part (the root span already
    // ends with '/'). Add a separator between subsequent parts.
    if (i > 0) {
      html += '<span class="sep">/</span>';
    }
    html += '<span onclick="navigateTo(\'' + p + '\')">' + part + '</span>';
  }
  el.innerHTML = html;
}

function renderFileList(entries) {
  const el = document.getElementById('fileList');

  if (entries.length === 0) {
    el.innerHTML = '<div class="empty-msg">Empty directory</div>';
    return;
  }

  // Sort: directories first, then files, alphabetical
  entries.sort((a, b) => {
    if (a.t !== b.t) return a.t === 'd' ? -1 : 1;
    return a.n.localeCompare(b.n);
  });

  let html = '';
  for (const entry of entries) {
    const isDir = entry.t === 'd';
    const editable = !isDir && isTextFile(entry.n, entry.s);
    const icon = isDir ? '&#x1F4C1;' : (editable ? '&#x1F4DD;' : '&#x1F4C4;');
    const size = isDir ? '' : formatSize(entry.s);
    const name = escapeHtml(entry.n);
    const clickAction = isDir
      ? 'navigateTo(\'' + escapeAttr(currentPath === '/' ? '/' + entry.n : currentPath + '/' + entry.n) + '\')'
      : (editable
          ? 'openEditor(\'' + escapeAttr(entry.n) + '\')'
          : 'downloadFile(\'' + escapeAttr(entry.n) + '\')');

    html += '<div class="file-row">';
    html += '<div class="icon">' + icon + '</div>';
    html += '<div class="name" onclick="' + clickAction + '">' + name + '</div>';
    html += '<div class="size">' + size + '</div>';
    html += '<div class="actions">';
    if (!isDir) {
      if (editable) {
        html += '<button onclick="openEditor(\'' + escapeAttr(entry.n) + '\')">Edit</button>';
      }
      html += '<button onclick="downloadFile(\'' + escapeAttr(entry.n) + '\')">DL</button>';
    }
    html += '<button onclick="renameEntry(\'' + escapeAttr(entry.n) + '\',' + isDir + ')">Rn</button>';
    html += '<button class="danger" onclick="deleteFile(\'' + escapeAttr(entry.n) + '\',' + isDir + ')">Del</button>';
    html += '</div>';
    html += '</div>';
  }
  el.innerHTML = html;
}

// ============================================================
// Drag & drop
// ============================================================
const uploadArea = document.getElementById('uploadArea');
uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('drag'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag'));
uploadArea.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadArea.classList.remove('drag');
  if (e.dataTransfer.files.length > 0) {
    uploadFiles(e.dataTransfer.files);
  }
});

// ============================================================
// Helpers
// ============================================================
function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function escapeAttr(s) {
  return s.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
}

function fileExtension(name) {
  const idx = name.lastIndexOf('.');
  return idx > 0 ? name.slice(idx + 1).toLowerCase() : '';
}

function isTextFile(name, size) {
  if (size > EDITOR_MAX_SIZE) return false;
  return TEXT_EXTENSIONS.has(fileExtension(name));
}

function log(msg, cls) {
  const box = document.getElementById('logBox');
  const line = document.createElement('div');
  line.className = 'log-line' + (cls ? ' ' + cls : '');
  const time = new Date().toLocaleTimeString();
  line.textContent = '[' + time + '] ' + msg;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function showProgress(pct, text) {
  const el = document.getElementById('progress');
  el.style.display = 'block';
  if (pct >= 0) {
    document.getElementById('progressFill').style.width = pct + '%';
  }
  document.getElementById('progressText').textContent = text || '';
}

function hideProgress() {
  document.getElementById('progress').style.display = 'none';
  document.getElementById('progressFill').style.width = '0%';
}

// Check Web Bluetooth availability
if (!navigator.bluetooth) {
  log('Web Bluetooth is not available in this browser. Use Chrome/Edge on a supported platform.', 'err');
  document.getElementById('btnConnect').disabled = true;
}
